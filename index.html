<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        h1 { font-size: 24px; }
        #score {
            font-size: 64px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #3390ec);
            margin: 20px 0;
        }
        #clickBtn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            background: var(--tg-theme-button-color, #3390ec);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        #clickBtn:active { transform: scale(0.95); }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .stat {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            min-width: 100px;
        }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #999; }
        #user { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🎮 Кликер</h1>
    
    <div id="score">0</div>
    <p>очков</p>
    
    <button id="clickBtn">КЛИК!</button>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="clicks">0</div>
            <div class="stat-label">Всего кликов</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="best">0</div>
            <div class="stat-label">Рекорд</div>
        </div>
    </div>
    
    <div id="user">Загрузка...</div>
    
    <script>
        // Telegram API
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Переменные
        var score = 0;
        var totalClicks = 0;
        var bestScore = 0;
        
        // Загрузка данных
        var saved = localStorage.getItem('clicker');
        if (saved) {
            var data = JSON.parse(saved);
            score = data.score || 0;
            totalClicks = data.totalClicks || 0;
            bestScore = data.bestScore || 0;
        }
        updateDisplay();
        
        // Клик
        document.getElementById("clickBtn").onclick = function() {
            score++;
            totalClicks++;
            if (score > bestScore) bestScore = score;
            updateDisplay();
            saveData();
        };
        
        function updateDisplay() {
            document.getElementById("score").textContent = score;
            document.getElementById("clicks").textContent = totalClicks;
            document.getElementById("best").textContent = bestScore;
        }
        
        function saveData() {
            localStorage.setItem('clicker', JSON.stringify({
                score: score,
                totalClicks: totalClicks,
                bestScore: bestScore
            }));
        }
        
        // Пользователь
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            var user = tg.initDataUnsafe.user;
            document.getElementById("user").textContent = 
                " " + user.first_name + " @" + (user.username || "");
        }
    </script>
</body>
</html>
